version: '3.9'

x-db-env: &db-env
  DB_HOST:     mysql
  DB_PORT:     "3306"
  DB_USER:     pg_user
  DB_PASSWORD: pg_password_2024
  DB_NAME:     payment_gateway

x-kafka-env: &kafka-env
  KAFKA_BROKERS: kafka:9092
  KAFKA_HOST:    kafka
  KAFKA_PORT:    "9092"
  TOPIC_PREFIX:  cdc

x-python-base: &python-base
  build:
    context: .
    dockerfile: Data-Sources/Dockerfile
  environment:
    <<: *db-env
  depends_on:
    mysql:
      condition: service_healthy
  networks:
    - payment_net

x-pipeline-base: &pipeline-base
  build:
    context: .
    dockerfile: Pipeline/Dockerfile.pipeline
  networks:
    - payment_net
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

services:

  # ── 1. MySQL ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: payment_gateway_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_2024
      MYSQL_DATABASE:      payment_gateway
      MYSQL_USER:          pg_user
      MYSQL_PASSWORD:      pg_password_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --max-connections=500
      --innodb-log-file-size=128M
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-row-image=FULL
      --expire-logs-days=3
    healthcheck:
      # Simple ping-only check — fast and reliable.
      # The schema-readiness check (transaction_statuses table)
      # is handled by entrypoint.py/entrypoint.sh on dependent
      # containers, so Docker healthcheck only needs to confirm
      # the MySQL process is accepting connections.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "pg_user", "-ppg_password_2024", "--silent"]
      interval: 10s
      timeout:  10s
      retries:  20
      start_period: 60s
    networks:
      - payment_net

  # ── 2. Adminer ────────────────────────────────────────────────
  adminer:
    image: adminer:4.8.1
    container_name: payment_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: dracula
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - payment_net

  # ── 3. Data Seeder ────────────────────────────────────────────
  data_seeder:
    <<: *python-base
    container_name: payment_data_seeder
    restart: "no"
    command:
      - python
      - generate_data.py
      - --host
      - mysql
      - --port
      - "3306"
      - --user
      - pg_user
      - --password
      - pg_password_2024
      - --database
      - payment_gateway
      - --clients
      - "10000"
      - --pos
      - "1000"
      - --transactions
      - "155000"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── 4. Data Streamer ──────────────────────────────────────────
  data_streamer:
    <<: *python-base
    container_name: payment_data_streamer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      data_seeder:
        condition: service_completed_successfully
    command:
      - python
      - stream_data.py
      - --host
      - mysql
      - --port
      - "3306"
      - --user
      - pg_user
      - --password
      - pg_password_2024
      - --database
      - payment_gateway
      - --txn-per-second
      - "2"
      - --clients-per-hour
      - "2"
      - --pos-per-day
      - "1"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── 5. Zookeeper ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,mntr,stat"
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL:    WARN
      ZOOKEEPER_TOOLS_LOG4J_LOGLEVEL:   WARN
      ZOOKEEPER_MAX_CLIENT_CNXNS:       60
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      interval: 10s
      timeout:  35s
      retries:  10
      start_period: 30s
    networks:
      - payment_net

  # ── 6. Kafka ──────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.1
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      # Single listener only — no PLAINTEXT_HOST to avoid bind failures
      KAFKA_LISTENERS:                        PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:    1
      KAFKA_LOG_RETENTION_HOURS:              168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_LOG4J_ROOT_LOGLEVEL:              WARN
    healthcheck:
      # Correct cub syntax: flags BEFORE positional args <min-brokers> <timeout>
      test: ["CMD", "cub", "kafka-ready", "-b", "localhost:9092", "1", "40"]
      interval: 15s
      timeout:  45s
      retries:  20
      start_period: 90s
    networks:
      - payment_net

  # ── 7. Kafdrop ────────────────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
    networks:
      - payment_net

  # ── 7b. Kafka Connect  (Debezium CDC engine) ─────────────────
  kafka-connect:
    image: debezium/connect:2.4
    container_name: kafka_connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS:           kafka:9092
      GROUP_ID:                    debezium-connect-group
      CONFIG_STORAGE_TOPIC:        debezium.configs
      OFFSET_STORAGE_TOPIC:        debezium.offsets
      STATUS_STORAGE_TOPIC:        debezium.status
      CONFIG_STORAGE_REPLICATION_FACTOR:  "1"
      OFFSET_STORAGE_REPLICATION_FACTOR:  "1"
      STATUS_STORAGE_REPLICATION_FACTOR:  "1"
      CONNECT_KEY_CONVERTER:       org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER:     org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE:   "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - payment_net

  # ── 7c. Debezium Connector Registration ───────────────────────
  # Runs once after Kafka Connect is healthy, registers the
  # MySQL CDC connector, then exits.
  debezium-register:
    # Use the pipeline image — kafka-python-ng is already installed
    build:
      context: .
      dockerfile: Pipeline/Dockerfile.pipeline
    container_name: debezium_register
    restart: "no"
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka-connect:
        condition: service_healthy
      data_seeder:
        condition: service_completed_successfully
    volumes:
      - ./Pipeline/debezium-connector.json:/connector.json:ro
      - ./Pipeline/register_connector.py:/register_connector.py:ro
    entrypoint: ["python3", "/register_connector.py"]
    networks:
      - payment_net

  # ── 8. Kafka → dbt  (CDC events trigger dbt runs directly) ──
  kafka_to_dbt:
    <<: *pipeline-base
    container_name: kafka_to_dbt
    restart: on-failure
    environment:
      <<: [*kafka-env, *db-env]
      WAIT_FOR:         "kafka,mysql"
      KAFKA_GROUP_ID:   "pg-dbt-trigger"
      TRIGGER_ROWS:     "500"
      TRIGGER_SECONDS:  "60"
      RUN_TESTS:        "false"
      DBT_PROJECT_DIR:  "/app/dbt"
      DBT_PROFILES_DIR: "/app/dbt"
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      debezium-register:
        condition: service_completed_successfully
    volumes:
      - ./dbt:/app/dbt
    command:
      - python
      - kafka_to_dbt.py

  # ── PostgreSQL ─────────────────────────────────────────────────
  # Hosts TWO databases:
  #   ${POSTGRES_DB}  — Airflow metadata (created via env var)
  #   analytics       — dbt mart tables (created via init script)
  postgres:
    image: postgres
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d  # creates analytics DB + mart tables
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - payment_net

  # ── Airflow Init ──────────────────────────────────────────────
  airflow-init:
    build:
      context: .
      dockerfile: Pipeline/Dockerfile.airflow
    image: payment-gateway-airflow:latest
    container_name: airflow-init
    restart: "no"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "sleep 10 && airflow db init && airflow db migrate && airflow users create --username $${AIRFLOW_ADMIN_USER} --firstname $${AIRFLOW_ADMIN_FIRSTNAME} --lastname $${AIRFLOW_ADMIN_LASTNAME} --role Admin --email $${AIRFLOW_ADMIN_EMAIL} --password $${AIRFLOW_ADMIN_PASSWORD}"
    networks:
      - payment_net

  # ── Airflow Scheduler ─────────────────────────────────────────
  airflow-scheduler:
    image: payment-gateway-airflow:latest
    container_name: airflow-scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ANALYTICS_DB_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/analytics
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
    command: scheduler
    networks:
      - payment_net

  # ── Airflow Webserver ─────────────────────────────────────────
  airflow-webserver:
    image: payment-gateway-airflow:latest
    container_name: airflow-webserver
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      airflow-scheduler:
        condition: service_started
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
    ports:
      - "8082:8080"
    command: webserver
    networks:
      - payment_net
  metabase:
    image: metabase/metabase:v0.60.x
    container_name: telecom_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE:       postgres
      MB_DB_HOST:       postgres
      MB_DB_PORT:       5432
      MB_DB_DBNAME:     analytics
      MB_DB_USER:       dbt_user
      MB_DB_PASS:       dbt_password
      JAVA_TIMEZONE:    UTC
      MB_EMOJI_IN_LOGS: "false"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payment_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  postgres_data:
    driver: local
  mysql_data:
    driver: local
  metabase_data:
    driver: local
networks:
  payment_net:
    driver: bridge
