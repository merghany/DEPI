version: '3.9'

# ─────────────────────────────────────────────────────────────────
# Shared environment blocks
# ─────────────────────────────────────────────────────────────────
x-db-env: &db-env
  DB_HOST:     mysql
  DB_PORT:     "3306"
  DB_USER:     pg_user
  DB_PASSWORD: pg_password_2024
  DB_NAME:     payment_gateway

x-kafka-env: &kafka-env
  KAFKA_BROKERS:  kafka:9092
  KAFKA_HOST:     kafka
  KAFKA_PORT:     "9092"
  TOPIC_PREFIX:   pg

x-minio-env: &minio-env
  MINIO_ENDPOINT:      minio:9000
  MINIO_API_PORT:      "9000"
  MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  MINIO_BUCKET:        payment-gateway

x-python-base: &python-base
  build:
    context: .
    dockerfile: Data-Sources/Dockerfile
  environment:
    <<: *db-env
  depends_on:
    mysql:
      condition: service_healthy
  networks:
    - payment_net

x-pipeline-base: &pipeline-base
  build:
    context: .
    dockerfile: Pipeline/Dockerfile.pipeline
  networks:
    - payment_net
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

# ─────────────────────────────────────────────────────────────────
services:

  # ── 1. MySQL 8.0 ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: payment_gateway_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_2024
      MYSQL_DATABASE:      payment_gateway
      MYSQL_USER:          pg_user
      MYSQL_PASSWORD:      pg_password_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --max-connections=500
      --innodb-log-file-size=128M
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - pg_user
        - pg_password_2024
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
    networks:
      - payment_net

  # ── 2. Adminer — web DB browser ───────────────────────────────
  adminer:
    image: adminer:4.8.1
    container_name: payment_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"                       # FIX: was 8080 — conflicted with airflow
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: dracula
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - payment_net

  # ── 3. Data Seeder ────────────────────────────────────────────
  data_seeder:
    <<: *python-base
    container_name: payment_data_seeder
    restart: "no"
    command:
      - python
      - generate_data.py
      - --host
      - mysql
      - --port
      - "3306"
      - --user
      - pg_user
      - --password
      - pg_password_2024
      - --database
      - payment_gateway
      - --clients
      - "10000"
      - --pos
      - "1000"
      - --transactions
      - "155000"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── 4. Data Streamer ──────────────────────────────────────────
  data_streamer:
    <<: *python-base
    container_name: payment_data_streamer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      data_seeder:
        condition: service_completed_successfully
    command:
      - python
      - stream_data.py
      - --host
      - mysql
      - --port
      - "3306"
      - --user
      - pg_user
      - --password
      - pg_password_2024
      - --database
      - payment_gateway
      - --txn-per-second
      - "2"
      - --clients-per-hour
      - "2"
      - --pos-per-day
      - "1"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"


  # ── 4 Zookeeper ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,mntr,stat"
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
      ZOOKEEPER_TOOLS_LOG4J_LOGLEVEL: WARN
      ZOOKEEPER_MAX_CLIENT_CNXNS: 60
      KAFKA_LOG4J_LOGGERS: "org.eclipse.jetty=ERROR,org.apache.zookeeper.server.quorum=ERROR,org.apache.zookeeper.server.ServerCnxnFactory=ERROR"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - payment_net

 # ── 5. Kafka ──────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.1
    container_name: kafka
    restart: unless-stopped                     # FIX 3a: was missing
    depends_on:                                 # FIX 3b: was missing entirely
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      # FIX 2: had PLAINTEXT://localhost:9092,PLAINTEXT://kafka:9092,...
      # Duplicate PLAINTEXT:// listener name crashes the broker on startup.
      # One PLAINTEXT for inter-container traffic, one PLAINTEXT_HOST for host.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:                                # FIX 3c: was missing — kafdrop/pipeline blocked forever
      test: ["CMD", "cub", "kafka-ready", "-b", "localhost:9092", "1", "40"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - payment_net

  # ──6  Kafdrop ───────────────────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
    networks:
      - payment_net
    # ── 7 Kafka Producer  (MySQL → Kafka) ───────────────────────────
  
  kafka_producer:
    <<: *pipeline-base
    container_name: kafka_producer
    restart: unless-stopped
    environment:
      <<: [*db-env, *kafka-env]
      WAIT_FOR:       "mysql,kafka"
      POLL_INTERVAL:  "15"
      BATCH_SIZE:     "500"
    depends_on:
      - mysql
      - kafka
      - data_seeder
    command:
      - python
      - kafka_producer.py

  # ── 8  Kafka Consumer  (Kafka → MinIO) ───────────────────────────
  
  kafka_consumer:
    <<: *pipeline-base
    container_name: kafka_consumer
    restart: unless-stopped
    environment:
      <<: [*kafka-env, *minio-env]
      WAIT_FOR:       "kafka,minio"
      KAFKA_GROUP_ID: "pg-minio-consumer"
      FLUSH_ROWS:     "1000"
      FLUSH_SECONDS:  "30"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    command:
      - python
      - kafka_consumer.py

# ─────────────────────────────────────────────────────────────────

  
  
  # ── 9  MinIO ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
      - "9002:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - payment_net


  # ── PostgreSQL (Airflow backend) ───────────────────────────────
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:                              # FIX: broken indentation + stray key
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - payment_net

  # ── Airflow Init (runs once) ───────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.3
    container_name: airflow-init
    restart: "no"                         # FIX: was missing — kept restarting
    env_file:
      - .env
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    entrypoint: /bin/bash
    command: >
      -c "
      echo 'Waiting for PostgreSQL...' &&
      sleep 10 &&
      airflow db init &&
      airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --role Admin --email ${AIRFLOW_ADMIN_EMAIL} --password ${AIRFLOW_ADMIN_PASSWORD} &&
      echo '✅ Airflow DB initialized successfully.'"
    networks:
      - payment_net

  # ── Airflow Scheduler ─────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: airflow-scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully  # FIX: wait for init to finish
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    command: scheduler
    networks:
      - payment_net

  # ── Airflow Webserver ─────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow-webserver
    restart: always
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully  # FIX: wait for init, not scheduler
      airflow-scheduler:
        condition: service_started
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    ports:
      - "8082:8080"                       # FIX: was 8080 — conflicted with adminer
    command: webserver
    networks:
      - payment_net

# ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
 #   driver: local
  minio_data:                             # FIX: declared missing volume
    driver: local
  mysql_data:
    driver: local

networks:
  payment_net:
    driver: bridge
